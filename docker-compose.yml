version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: shifttrack_postgres
    environment:
      POSTGRES_DB: shifttrack_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - shifttrack_data:/var/lib/postgresql/data

volumes:
  shifttrack_data:
